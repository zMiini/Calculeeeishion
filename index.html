<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abidos Calculators</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="https://lostarkcodex.com/icons/use_8_109.webp">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>

    <div class="tab-header">
        <button class="tab-link active" onclick="openTab(event, 'tab-one')"><img src="superior_abidos.png" class="inline-emoji" alt="icon"> Superior Abidos</button>
        <button class="tab-link" onclick="openTab(event, 'tab-two')"><img src="abidos.png" class="inline-emoji" alt="icon"> Abidos</button>
    </div>

    <div id="tab-one" class="tab-content" style="display: block;">
    <h1><img src="superior_abidos.png" class="inline-emoji" alt="icon"> Superior Abidos Crafting Optimizer</h1>
    
    <p>The calculation now finds the true maximum by aggressively exchanging excess Green/Gray for Blue powder.</p>

    <div class="input-group">
        <label for="supGray">Current Gray:</label>
        <input type="number" id="supGray" value="0" min="0">
    </div>

    <div class="input-group">
        <label for="supGreen">Current Green:</label>
        <input type="number" id="supGreen" value="0" min="0">
    </div>

    <div class="input-group">
        <label for="supBlue">Current Blue:</label>
        <input type="number" id="supBlue" value="0" min="0">
    </div>

    <button type="button" id="supCalculate">Optimize and Calculate Max Items</button>
    <div id="supResults"></div>
    </div>

    <div id="tab-two" class="tab-content">
    <h1><img src="abidos.png" class="inline-emoji" alt="icon"> Abidos Crafting Optimizer </h1>
    
    <p>The calculation now finds the true maximum by aggressively exchanging excess Green/Gray for Blue powder.</p>

    <div class="input-group">
        <label for="stdGray">Current Gray:</label>
        <input type="number" id="stdGray" value="0" min="0">
    </div>

    <div class="input-group">
        <label for="stdGreen">Current Green:</label>
        <input type="number" id="stdGreen" value="0" min="0">
    </div>

    <div class="input-group">
        <label for="stdBlue">Current Blue:</label>
        <input type="number" id="stdBlue" value="0" min="0">
    </div>

    <button type="button" id="stdCalculate">Optimize and Calculate Max Items</button>
    <div id="stdResults"></div>
    </div>

    <script src="craft_logic_superior.js"></script>
    <script src="craft_logic.js"></script>
    <script>
    function openTab(evt, tabId) {
// 1. Hide all tab content
    let contents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < contents.length; i++) {
        contents[i].style.display = "none";
    }

// 2. Remove the "active" class from all buttons
    let links = document.getElementsByClassName("tab-link");
    for (let i = 0; i < links.length; i++) {
        links[i].className = links[i].className.replace(" active", "");
    }

          // 3. Show the current tab and add "active" class to the button
    document.getElementById(tabId).style.display = "block";
        evt.currentTarget.className += " active";
    }
    </script>
</body>
</html>
